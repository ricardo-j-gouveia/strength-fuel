<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strength Fuel — Tesco Lean Mass Planner</title>

  <style>
    :root { --bg:#f7f7f7; --card:#fff; --text:#1f1f1f; --muted:#666; --line:#ddd; --brand:#111; --ok:#0a7a2f; --warn:#a85b00; --bad:#b00020; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    header { background: var(--brand); color:#fff; padding: 1.2rem 1rem; text-align:center; }
    header h1 { margin: 0 0 .35rem 0; font-size: 1.6rem; }
    header p { margin: 0; opacity: .9; }
    main { max-width: 1200px; margin: 0 auto; padding: 1.1rem; display: grid; gap: 1rem; }

    section { background: var(--card); border: 1px solid var(--line); border-radius: 10px; padding: 1rem; }
    h2 { margin: 0 0 .7rem 0; font-size: 1.2rem; }
    h3 { margin: .2rem 0 .6rem 0; font-size: 1.05rem; }
    .sub { margin: -.2rem 0 .8rem 0; color: var(--muted); font-size: .95rem; }

    .grid { display:grid; gap: .8rem; grid-template-columns: repeat(12, 1fr); }
    .col-12 { grid-column: span 12; }
    .col-6  { grid-column: span 6; }
    .col-4  { grid-column: span 4; }
    .col-3  { grid-column: span 3; }
    @media (max-width: 980px){ .col-6,.col-4,.col-3 { grid-column: span 12; } }

    label { display:block; font-size: .95rem; margin-bottom: .35rem; }
    input[type="number"], input[type="text"], select {
      width: 100%; padding: .6rem .65rem; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem;
    }

    .row { display:flex; gap: .6rem; flex-wrap: wrap; align-items:center; }
    button { background: var(--brand); color:#fff; border:0; padding: .65rem .85rem; border-radius: 9px; cursor:pointer; font-weight: 700; }
    button.secondary { background: #444; }
    button.ghost { background: transparent; color: var(--brand); border: 1px solid var(--line); }

    .checkgrid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: .45rem .8rem; }
    @media (max-width: 980px){ .checkgrid { grid-template-columns: 1fr; } }
    .check { display:flex; gap:.55rem; align-items:center; padding:.38rem .45rem; border: 1px solid var(--line); border-radius: 9px; background:#fafafa; }
    .check input { width:auto; }
    .muted { color: var(--muted); }
    .small { font-size: .92rem; }
    .hr { height:1px; background: var(--line); margin: .9rem 0; }

    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { border: 1px solid var(--line); padding: .7rem; text-align: left; vertical-align: top; }
    th { background: #eee; }

    .two-col { display:grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 980px){ .two-col { grid-template-columns: 1fr; } }

    .status-ok { color: var(--ok); font-weight: 700; }
    .status-warn { color: var(--warn); font-weight: 700; }
    .status-bad { color: var(--bad); font-weight: 700; }

    #errorBox { display:none; background:#fff3f3; border:1px solid #ffb3b3; padding:.8rem; border-radius:10px; }
    #errorBox pre { white-space: pre-wrap; margin:.6rem 0 0 0; font-size:.9rem; color:#7a0012; }
    footer { text-align:center; padding: 1.2rem 1rem 2rem; color: var(--muted); }
  </style>
</head>

<body>
<header>
  <h1>Strength Fuel</h1>
  <p>Tesco-only • Lean mass gain • Fibre-first • Plan + shopping generated from your selections</p>
</header>

<main>

  <section id="errorBox">
    <strong class="status-bad">Script error (this is why buttons/options don’t work)</strong>
