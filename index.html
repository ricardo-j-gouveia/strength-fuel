<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <title>Strength Fuel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f7f7f7; }
    header { background: #111; color: #fff; padding: 1rem; text-align: center; }
    main { max-width: 1000px; margin: auto; padding: 1rem; }
    section { background: #fff; padding: 1rem; margin-bottom: 1rem; border-radius: 8px; }
    h2 { margin-top: 0; }
    label { display: block; margin: .4rem 0; }
    button { padding: .6rem 1rem; background: #111; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: .5rem; text-align: left; }
    th { background: #eee; }
    ul { margin-left: 1.2rem; }
  </style>
</head>

<body>
<header>
  <h1>Strength Fuel</h1>
  <p>Tesco-only • Lean mass gain • Fibre-first</p>
</header>

<main>

<section>
  <h2>Select meats (used for lunches)</h2>

  <label><input type="checkbox" id="beef" checked> Beef (5% mince)</label>
  <label><input type="checkbox" id="pork"> Pork (loin/steaks)</label>
  <label><input type="checkbox" id="duck"> Duck breast</label>
  <label><input type="checkbox" id="chicken"> Chicken breast</label>
  <label><input type="checkbox" id="fish" checked> Fish (cod/salmon)</label>

  <br>
  <button onclick="generate()">Generate meal plan</button>
</section>

<section>
  <h2>Meal plan (Monday–Friday, no dinners)</h2>

  <table>
    <thead>
      <tr>
        <th>Day</th>
        <th>Lunch</th>
      </tr>
    </thead>
    <tbody id="meals"></tbody>
  </table>
</section>

<section>
  <h2>Tesco shopping list</h2>
  <ul id="shopping"></ul>
</section>

</main>

<script>
function generate() {
  var meats = [];

  if (document.getElementById("beef").checked)
    meats.push("Tesco 5% Fat Beef Mince");

  if (document.getElementById("pork").checked)
    meats.push("Tesco Pork Loin Steaks");

  if (document.getElementById("duck").checked)
    meats.push("Tesco Duck Breast Fillets");

  if (document.getElementById("chicken").checked)
    meats.push("Tesco Chicken Breast Fillets");

  if (document.getElementById("fish").checked)
    meats.push("Tesco Cod or Salmon Fillets");

  var days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];

  var mealBody = document.getElementById("meals");
  mealBody.innerHTML = "";

  for (var i = 0; i < days.length; i++) {
    var protein = meats.length ? meats[i % meats.length] : "⚠ Select at least one meat";
    var tr = document.createElement("tr");
    tr.innerHTML =
      "<td>" + days[i] + "</td>" +
      "<td>" + protein + " + rice + salad</td>";
    mealBody.appendChild(tr);
  }

  var shop = document.getElementById("shopping");
  shop.innerHTML = "";

  if (!meats.length) {
    var li = document.createElement("li");
    li.textContent = "No meats selected";
    shop.appendChild(li);
    return;
  }

  for (var j = 0; j < meats.length; j++) {
    var li2 = document.createElement("li");
    li2.textContent = meats[j];
    shop.appendChild(li2);
  }

  shop.appendChild(makeItem("Tesco Easy Cook Long Grain Rice"));
  shop.appendChild(makeItem("Tesco Mixed Salad Leaves"));
}

function makeItem(text) {
  var li = document.createElement("li");
  li.textContent = text;
  return li;
}
</script>

</body>
</html>
