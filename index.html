<!DOCTYPE html>
<html lang="en">
<head>

  <title>Strength Fuel – Diagnostic</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 0; }
    header { background:#111; color:#fff; padding:1rem; }
    main { padding:1rem; }
    button { padding:.5rem 1rem; }
  </style>
</head>
<body>

<header>
  <h1>Strength Fuel</h1>
  <p>If you see text below, HTML is rendering</p>

<main>

</main>

<script>
  function test() {
    document.getElementById("out").textContent = "✅ JavaScript is running";
  }
</script>

</body>
</html>
